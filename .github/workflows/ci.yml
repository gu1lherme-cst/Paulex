name: CI

# Qualidade antes do merge: lint, typecheck e build do app React +
# validador estático do tema Shopify. Roda em qualquer push e em PRs.
on:
  push:
    branches-ignore: []
  pull_request:

jobs:
  web:
    name: App React (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  theme:
    name: Tema Shopify (validador estático)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node # necessário para o `node --check` do validador
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar tema
        run: python3 paulex-shopify-theme/tools/validate.py
