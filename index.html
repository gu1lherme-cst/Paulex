  <body>
    <div id="root"></div>
    <script>
      // Remove o Service Worker e os caches do PWA antigo (Px), que ainda
      // serviam a página velha. Recarrega uma única vez para buscar a versão atual.
      (function () {
        if (!("serviceWorker" in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (rs) {
          var hadSW = rs.length > 0;
          Promise.all(rs.map(function (r) { return r.unregister(); }))
            .then(function () {
              if (window.caches && caches.keys) {
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
            })
            .then(function () {
              if (hadSW && !sessionStorage.getItem("paulex-fresh")) {
                sessionStorage.setItem("paulex-fresh", "1");
                location.reload();
              }
            })
            .catch(function () {});
        }).catch(function () {});
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
